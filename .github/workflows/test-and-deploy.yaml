name: Test and Deploy

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage gate
        run: python -m pytest

  build-and-deploy:
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on:
      - self-hosted
      - pc-wee
      - X64
    timeout-minutes: 60
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout shared repository
        uses: actions/checkout@v4
        with:
          path: fiap-soat-video-shared

      - name: Checkout local-dev repository
        uses: actions/checkout@v4
        with:
          repository: SOAT-264/fiap-soat-video-local-dev
          path: fiap-soat-video-local-dev

      - name: Checkout auth repository
        uses: actions/checkout@v4
        with:
          repository: SOAT-264/fiap-soat-video-auth
          path: fiap-soat-video-auth

      - name: Checkout jobs repository
        uses: actions/checkout@v4
        with:
          repository: SOAT-264/fiap-soat-video-jobs
          path: fiap-soat-video-jobs

      - name: Checkout notifications repository
        uses: actions/checkout@v4
        with:
          repository: SOAT-264/fiap-soat-video-notifications
          path: fiap-soat-video-notifications

      - name: Checkout service repository
        uses: actions/checkout@v4
        with:
          repository: SOAT-264/fiap-soat-video-service
          path: fiap-soat-video-service

      - name: Checkout observability repository
        uses: actions/checkout@v4
        with:
          repository: SOAT-264/fiap-soat-video-obs
          path: fiap-soat-video-obs

      - name: Validate runner tooling
        working-directory: ${{ github.workspace }}
        run: |
          $requiredCommands = @("docker", "git", "kubectl", "awslocal")

          foreach ($command in $requiredCommands) {
              if (-not (Get-Command $command -ErrorAction SilentlyContinue)) {
                  throw "Command '$command' was not found on the runner."
              }
          }

          docker version
          docker compose version
          kubectl version --client
          kubectl cluster-info

      - name: Build and deploy local integrated stack
        working-directory: ${{ github.workspace }}/fiap-soat-video-local-dev/scripts/windows
        run: .\start.ps1

      - name: Verify integrated service health checks
        run: |
          $endpoints = @(
            @{ Name = "auth"; Url = "http://localhost:32513/health" },
            @{ Name = "jobs"; Url = "http://localhost:32514/health" },
            @{ Name = "notifications"; Url = "http://localhost:32515/health" },
            @{ Name = "video-service"; Url = "http://localhost:32516/health" }
          )

          foreach ($endpoint in $endpoints) {
            $healthy = $false

            for ($attempt = 1; $attempt -le 6; $attempt++) {
              try {
                $response = Invoke-WebRequest -Uri $endpoint.Url -UseBasicParsing -TimeoutSec 10

                if ($response.StatusCode -eq 200) {
                  $healthy = $true
                  break
                }
              }
              catch {
              }

              Start-Sleep -Seconds 10
            }

            if (-not $healthy) {
              throw "Health check failed for '$($endpoint.Name)' at '$($endpoint.Url)'."
            }
          }